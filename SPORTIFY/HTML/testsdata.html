<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPORTIFY - Data Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0e27;
            color: #fff;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #ffa500; }
        button {
            background: #ffa500;
            color: #0a0e27;
            padding: 1rem 2rem;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 0.5rem;
            border-radius: 5px;
        }
        button:hover {
            opacity: 0.8;
        }
        .status {
            background: #1a1f3a;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid #ffa500;
            border-radius: 5px;
        }
        .success { border-left-color: #00ff00; }
        .error { border-left-color: #ff0000; }
        pre {
            background: #151933;
            padding: 1rem;
            overflow-x: auto;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🔧 SPORTIFY Data Test Page</h1>
    
    <div class="status" id="status">
        <h3>Status: Checking...</h3>
        <p id="statusMsg">Please wait while we check your data...</p>
    </div>

    <button onclick="checkData()">🔍 Check Data</button>
    <button onclick="clearData()">🗑️ Clear LocalStorage</button>
    <button onclick="reloadData()">🔄 Reload Default Data</button>
    <button onclick="window.location.href='Teams.html'">➡️ Go to Teams Page</button>

    <h2>Data Preview:</h2>
    <div id="dataPreview"></div>

    <script src="../js/teams.js"></script>
    <script>
        function checkData() {
            const statusDiv = document.getElementById('status');
            const statusMsg = document.getElementById('statusMsg');
            const preview = document.getElementById('dataPreview');
            
            // Check localStorage
            const savedLeagues = localStorage.getItem('leagues');
            const savedTeams = localStorage.getItem('teams');
            const savedTeamDetails = localStorage.getItem('teamDetails');
            
            let html = '<h3>LocalStorage Check:</h3><ul>';
            
            if (savedLeagues) {
                const leagues = JSON.parse(savedLeagues);
                html += `<li>✅ Leagues found: ${leagues.length} leagues</li>`;
                statusDiv.className = 'status success';
            } else {
                html += `<li>❌ No leagues found in localStorage</li>`;
                statusDiv.className = 'status error';
            }
            
            if (savedTeams) {
                const teams = JSON.parse(savedTeams);
                let totalTeams = 0;
                for (let league in teams) {
                    totalTeams += teams[league].length;
                }
                html += `<li>✅ Teams found: ${totalTeams} teams across all leagues</li>`;
            } else {
                html += `<li>❌ No teams found in localStorage</li>`;
            }
            
            if (savedTeamDetails) {
                const details = JSON.parse(savedTeamDetails);
                html += `<li>✅ Team details found: ${Object.keys(details).length} teams with details</li>`;
            } else {
                html += `<li>❌ No team details found in localStorage</li>`;
            }
            
            html += '</ul>';
            
            // Show detailed data
            if (savedLeagues) {
                const leagues = JSON.parse(savedLeagues);
                html += '<h3>Leagues:</h3><pre>' + JSON.stringify(leagues, null, 2) + '</pre>';
                
                if (savedTeams) {
                    const teams = JSON.parse(savedTeams);
                    html += '<h3>Teams Preview (Premier League):</h3><pre>' + 
                            JSON.stringify(teams['premier-league'], null, 2).substring(0, 1000) + 
                            '...</pre>';
                }
            }
            
            preview.innerHTML = html;
            
            if (savedLeagues && savedTeams && savedTeamDetails) {
                statusMsg.innerHTML = '✅ All data loaded successfully! You can go to the Teams page now.';
            } else {
                statusMsg.innerHTML = '⚠️ Some data is missing. Click "Reload Default Data" to fix this.';
            }
        }
        
        function clearData() {
            if (confirm('Are you sure you want to clear all data? This will reset everything.')) {
                localStorage.removeItem('leagues');
                localStorage.removeItem('teams');
                localStorage.removeItem('teamDetails');
                alert('Data cleared! Click "Reload Default Data" to restore defaults.');
                checkData();
            }
        }
        
        function reloadData() {
            // Clear existing data
            localStorage.removeItem('leagues');
            localStorage.removeItem('teams');
            localStorage.removeItem('teamDetails');
            
            // Reinitialize
            initializeDefaultData();
            
            alert('Default data reloaded!');
            checkData();
        }
        
        // Auto-check on load
        window.onload = function() {
            setTimeout(checkData, 500);
        };
    </script>
</body>
</html>
